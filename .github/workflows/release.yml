name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/calctokens
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
