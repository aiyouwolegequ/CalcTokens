name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            binary: calctokens
          - runs-on: macos-latest
            binary: calctokens-macos-arm64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Linux
        if: matrix.binary == 'calctokens'
        run: cargo clean --release && cargo build --release
      - name: Build macOS
        if: matrix.binary == 'calctokens-macos-arm64'
        run: |
          cargo clean --release
          cargo build --release --target aarch64-apple-darwin
      - name: Prepare binary
        run: |
          if [ "${{ matrix.binary }}" = "calctokens" ]; then
            cp target/release/calctokens calctokens
          else
            cp target/aarch64-apple-darwin/release/calctokens calctokens-macos-arm64
          fi
      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
